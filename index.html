<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AN APK Store</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --surface3: #252b3b;
    --border: #2a3045;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,.55);
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background .4s ease, color .4s ease;
  }
  button { cursor: pointer; border: none; outline: none; }
  input, select, textarea { outline: none; }
  a { text-decoration: none; color: inherit; }
  img { max-width: 100%; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  #loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity .6s ease, visibility .6s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; }
  .loader-logo {
    font-size: 2.4rem; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 28px; animation: pulse 1.4s ease-in-out infinite;
  }
  .spinner-ring {
    width: 56px; height: 56px;
    border: 4px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .9s linear infinite;
  }
  .loader-glow {
    position: absolute; width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(108,99,255,.18) 0%, transparent 70%);
    border-radius: 50%; animation: glow 2s ease-in-out infinite alternate;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
  @keyframes glow { from{transform:scale(1)} to{transform:scale(1.3)} }

  header {
    position: sticky; top: 0; z-index: 500;
    background: rgba(13,15,20,.92);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 64px;
    display: flex; align-items: center; gap: 14px;
    transition: background .4s ease;
  }
  .header-logo {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1rem; color: #fff;
    cursor: pointer; overflow: hidden; flex-shrink: 0;
    transition: transform .2s;
  }
  .header-logo:hover { transform: scale(1.08); }
  .header-logo img { width: 100%; height: 100%; object-fit: cover; }
  .header-title {
    font-size: 1.15rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    flex: 1;
  }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 1.1rem; transition: all .2s;
  }
  .icon-btn:hover { background: var(--surface3); color: var(--text); }

  .search-wrap { padding: 16px 20px 8px; position: relative; }
  .search-wrap input {
    width: 100%; padding: 12px 16px 12px 44px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 50px; color: var(--text); font-size: .95rem;
    transition: border .2s, background .4s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute; left: 34px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 1rem; pointer-events: none;
  }

  .cat-scroll {
    display: flex; gap: 10px; padding: 10px 20px 14px;
    overflow-x: auto; scrollbar-width: none;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0; padding: 6px 16px; border-radius: 50px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: .82rem; font-weight: 600;
    transition: all .2s; cursor: pointer;
  }
  .cat-pill.active, .cat-pill:hover {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }

  .section-title {
    padding: 6px 20px 12px; font-size: 1rem; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title span { color: var(--accent); }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 14px; padding: 0 16px 100px;
  }

  .app-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 12px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer; transition: transform .2s, box-shadow .2s, border-color .2s, background .4s;
    position: relative; overflow: hidden;
  }
  .app-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(108,99,255,.06), transparent);
    opacity: 0; transition: opacity .2s;
  }
  .app-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent); }
  .app-card:hover::before { opacity: 1; }
  .app-icon {
    width: 68px; height: 68px; border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; color: #fff; overflow: hidden; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(108,99,255,.35);
  }
  .app-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
  .app-name {
    font-size: .85rem; font-weight: 700; text-align: center; color: var(--text); line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .app-cat { font-size: .72rem; color: var(--muted); text-align: center; }
  .app-meta { display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .app-size { font-size: .7rem; color: var(--muted); }
  .badge {
    font-size: .65rem; font-weight: 700; padding: 3px 8px; border-radius: 50px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .badge-free { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
  .badge-paid { background: rgba(245,158,11,.15); color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }

  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .es-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: .9rem; }

  .overlay {
    position: fixed; inset: 0; z-index: 800;
    background: rgba(0,0,0,.7);
    display: none; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; }
  @media(min-width:600px) { .overlay { align-items: center; } }
  .modal {
    background: var(--surface); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 540px; max-height: 92vh;
    overflow-y: auto; padding: 24px 22px 36px;
    animation: slideUp .35s cubic-bezier(.34,1.56,.64,1);
    border: 1px solid var(--border); transition: background .4s;
  }
  @media(min-width:600px) { .modal { border-radius: 24px; } }
  @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 1.1rem; font-weight: 800; }
  .modal-close {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 1.1rem; transition: all .2s;
  }
  .modal-close:hover { background: var(--red); color: #fff; }

  .app-detail-header { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 18px; }
  .app-detail-icon {
    width: 80px; height: 80px; border-radius: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; color: #fff; overflow: hidden; flex-shrink: 0;
    box-shadow: 0 6px 24px rgba(108,99,255,.4);
  }
  .app-detail-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }
  .app-detail-info { flex: 1; }
  .app-detail-name { font-size: 1.15rem; font-weight: 800; margin-bottom: 4px; }
  .app-detail-cat { font-size: .8rem; color: var(--muted); margin-bottom: 8px; }
  .app-detail-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .detail-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .detail-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; font-size: .8rem;
    display: flex; flex-direction: column; gap: 2px; min-width: 80px;
  }
  .detail-chip-label { color: var(--muted); font-size: .7rem; }
  .detail-chip-val { font-weight: 700; color: var(--text); }
  .app-description { font-size: .88rem; color: var(--muted); line-height: 1.7; margin-bottom: 22px; }
  .price-tag { font-size: 1.6rem; font-weight: 900; color: var(--yellow); margin-bottom: 16px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 24px; border-radius: 50px; font-size: .92rem; font-weight: 700;
    transition: all .2s; border: none; cursor: pointer; width: 100%;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 20px rgba(108,99,255,.45); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(108,99,255,.6); }
  .btn-green { background: linear-gradient(135deg, #16a34a, var(--green)); color: #fff; box-shadow: 0 4px 20px rgba(34,197,94,.35); }
  .btn-green:hover { transform: translateY(-2px); }
  .btn-yellow { background: linear-gradient(135deg, #d97706, var(--yellow)); color: #fff; box-shadow: 0 4px 20px rgba(245,158,11,.35); }
  .btn-yellow:hover { transform: translateY(-2px); }
  .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
  .btn-outline:hover { background: var(--accent); color: #fff; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { opacity: .85; }
  .btn-sm { padding: 8px 16px; font-size: .8rem; width: auto; }
  .btn-telegram { background: linear-gradient(135deg, #0088cc, #229ED9); color: #fff; box-shadow: 0 4px 20px rgba(0,136,204,.4); }
  .btn-telegram:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,136,204,.55); }

  .payment-method-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 12px; cursor: pointer; transition: all .2s;
  }
  .payment-method-card.selected { border-color: var(--accent); background: var(--surface3); }
  .payment-method-card:hover { border-color: var(--accent); }
  .pm-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--surface3); display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; overflow: hidden; flex-shrink: 0;
  }
  .pm-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .pm-info { flex: 1; }
  .pm-name { font-weight: 700; font-size: .92rem; }
  .pm-number { font-size: .8rem; color: var(--muted); margin-top: 2px; }
  .pm-selected-dot {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .payment-method-card.selected .pm-selected-dot { border-color: var(--accent); background: var(--accent); }
  .payment-method-card.selected .pm-selected-dot::after { content: '✓'; color: #fff; font-size: .65rem; font-weight: 900; }
  .pm-instructions {
    background: var(--surface3); border-radius: 10px; padding: 12px 14px;
    font-size: .82rem; color: var(--muted); line-height: 1.6; margin: 12px 0;
    border-left: 3px solid var(--accent);
  }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .form-input {
    width: 100%; padding: 12px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: .92rem;
    transition: border .2s, background .4s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }
  select.form-input { cursor: pointer; }
  textarea.form-input { resize: vertical; min-height: 80px; }

  .success-box { text-align: center; padding: 30px 20px; }
  .success-icon { font-size: 3.5rem; margin-bottom: 14px; }
  .success-title { font-size: 1.2rem; font-weight: 800; color: var(--green); margin-bottom: 8px; }
  .success-sub { font-size: .88rem; color: var(--muted); margin-bottom: 24px; }

  .admin-tabs {
    display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
    margin-bottom: 20px; padding-bottom: 4px; flex-wrap: nowrap;
  }
  .admin-tabs::-webkit-scrollbar { display: none; }
  .admin-tab {
    flex-shrink: 0; padding: 8px 14px; border-radius: 8px; font-size: .8rem; font-weight: 700;
    background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
    transition: all .2s; cursor: pointer;
  }
  .admin-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .admin-app-row {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px;
  }
  .admin-app-row .aa-icon {
    width: 42px; height: 42px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; overflow: hidden; flex-shrink: 0;
  }
  .admin-app-row .aa-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .admin-app-row .aa-info { flex: 1; }
  .admin-app-row .aa-name { font-weight: 700; font-size: .88rem; }
  .admin-app-row .aa-meta { font-size: .75rem; color: var(--muted); }
  .admin-app-row .aa-actions { display: flex; gap: 6px; }

  .icon-upload-box {
    width: 80px; height: 80px; border-radius: 16px;
    background: var(--surface2); border: 2px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; cursor: pointer; overflow: hidden; transition: border .2s;
  }
  .icon-upload-box:hover { border-color: var(--accent); }
  .icon-upload-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }

  .pm-admin-row {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px;
  }
  .pm-admin-row .pma-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--surface3); display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; overflow: hidden; flex-shrink: 0;
  }
  .pm-admin-row .pma-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .pm-admin-row .pma-info { flex: 1; }
  .pm-admin-row .pma-name { font-weight: 700; font-size: .88rem; }
  .pm-admin-row .pma-num { font-size: .75rem; color: var(--muted); }

  .login-box { text-align: center; padding-top: 10px; }
  .login-logo {
    width: 72px; height: 72px; border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: 900; color: #fff;
    margin: 0 auto 16px; overflow: hidden;
  }
  .login-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
  .login-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 6px; }
  .login-sub { font-size: .82rem; color: var(--muted); margin-bottom: 24px; }
  .login-switch { font-size: .82rem; color: var(--muted); margin-top: 14px; text-align: center; }
  .login-switch span { color: var(--accent); cursor: pointer; font-weight: 700; }
  .error-msg { color: var(--red); font-size: .8rem; margin-top: -8px; margin-bottom: 12px; }

  #toast-container { position: fixed; top: 80px; right: 16px; z-index: 9000; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--surface2); border: 1px solid var(--border); border-left: 4px solid var(--accent);
    border-radius: 10px; padding: 12px 18px; font-size: .85rem; color: var(--text);
    box-shadow: var(--shadow); max-width: 300px;
    animation: toastIn .35s ease; display: flex; align-items: center; gap: 10px;
  }
  .toast.toast-success { border-left-color: var(--green); }
  .toast.toast-error { border-left-color: var(--red); }
  @keyframes toastIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  #main-content { animation: fadeIn .5s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  #bg-picker-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 1.1rem; transition: all .2s; cursor: pointer;
    position: relative;
  }
  #bg-picker-btn:hover { background: var(--surface3); color: var(--text); }

  #bg-panel {
    position: fixed; top: 72px; right: 16px; z-index: 700;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 20px 18px 18px;
    width: 300px; box-shadow: var(--shadow);
    display: none; animation: slideDown .3s cubic-bezier(.34,1.56,.64,1);
  }
  #bg-panel.open { display: block; }
  @keyframes slideDown { from{transform:translateY(-16px);opacity:0} to{transform:translateY(0);opacity:1} }

  .bg-panel-title {
    font-size: .9rem; font-weight: 800; color: var(--text);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .bg-panel-close {
    margin-left: auto; width: 26px; height: 26px; border-radius: 50%;
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: .85rem; cursor: pointer; transition: all .2s; flex-shrink: 0;
  }
  .bg-panel-close:hover { background: var(--red); color: #fff; }

  .palette-label { font-size: .75rem; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .palette-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 16px;
  }
  .palette-swatch {
    width: 100%; aspect-ratio: 1; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent; transition: transform .15s, border-color .15s;
    position: relative;
  }
  .palette-swatch:hover { transform: scale(1.12); }
  .palette-swatch.active { border-color: #fff; }
  .palette-swatch.active::after {
    content: '✓'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: .65rem; color: #fff; font-weight: 900;
    text-shadow: 0 1px 3px rgba(0,0,0,.7);
  }

  .gradient-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .gradient-swatch {
    height: 42px; border-radius: 10px; cursor: pointer;
    border: 2px solid transparent; transition: transform .15s, border-color .15s;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .gradient-swatch:hover { transform: scale(1.04); }
  .gradient-swatch.active { border-color: #fff; }
  .gradient-swatch span { font-size: .7rem; font-weight: 700; color: rgba(255,255,255,.85); text-shadow: 0 1px 4px rgba(0,0,0,.5); }

  .custom-row { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
  .custom-color-input {
    width: 44px; height: 44px; border-radius: 10px; border: 2px solid var(--border);
    cursor: pointer; background: transparent; padding: 2px;
    transition: border .2s;
  }
  .custom-color-input:hover { border-color: var(--accent); }
  .custom-hex-input {
    flex: 1; padding: 10px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: .85rem; font-family: monospace;
    transition: border .2s;
  }
  .custom-hex-input:focus { border-color: var(--accent); }
  .apply-custom-btn {
    padding: 10px 14px; background: var(--accent); color: #fff;
    border-radius: 10px; font-size: .8rem; font-weight: 700;
    transition: all .2s; cursor: pointer; border: none; white-space: nowrap;
  }
  .apply-custom-btn:hover { opacity: .85; transform: scale(1.04); }

  .reset-bg-btn {
    width: 100%; padding: 10px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--muted); font-size: .82rem; font-weight: 700;
    cursor: pointer; transition: all .2s;
  }
  .reset-bg-btn:hover { border-color: var(--red); color: var(--red); }

  body.has-gradient { background-attachment: fixed; }

  /* ===== DOWNLOAD PROGRESS BAR ===== */
  .download-progress-wrap {
    width: 100%; margin-top: 12px; display: none;
  }
  .download-progress-wrap.active { display: block; }
  .download-progress-bar-bg {
    width: 100%; height: 8px; background: var(--surface2); border-radius: 50px; overflow: hidden;
  }
  .download-progress-bar {
    height: 100%; width: 0%; border-radius: 50px;
    background: linear-gradient(90deg, var(--accent), var(--green));
    transition: width .3s ease;
  }
  .download-progress-text {
    font-size: .75rem; color: var(--muted); margin-top: 6px; text-align: center;
  }

  /* ===== DOWNLOAD COUNT BADGE ===== */
  .app-downloads { font-size: .68rem; color: var(--accent2); display: flex; align-items: center; gap: 3px; }

  @media(max-width:380px) { .apps-grid { grid-template-columns: repeat(2, 1fr); } }
  @media(max-width:320px) { #bg-panel { width: calc(100vw - 32px); right: 16px; } }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-glow"></div>
  <div class="loader-logo">AN APK Store</div>
  <div class="spinner-ring"></div>
</div>

<div id="toast-container"></div>

<div id="bg-panel">
  <div class="bg-panel-title">
    🎨 Background Color
    <button class="bg-panel-close" onclick="toggleBgPanel()">✕</button>
  </div>
  <div class="palette-label">Solid Colors</div>
  <div class="palette-grid" id="palette-grid"></div>
  <div class="palette-label">Gradient Themes</div>
  <div class="gradient-grid" id="gradient-grid"></div>
  <div class="palette-label">Custom Color</div>
  <div class="custom-row">
    <input type="color" class="custom-color-input" id="custom-color-picker" value="#0d0f14" />
    <input type="text" class="custom-hex-input" id="custom-hex" placeholder="#0d0f14" maxlength="7" />
    <button class="apply-custom-btn" onclick="applyCustomColor()">Apply</button>
  </div>
  <button class="reset-bg-btn" onclick="resetBackground()">↺ Reset to Default</button>
</div>

<div id="main-content">
  <header>
    <div class="header-logo" id="header-logo-btn" title="Store Logo">AN</div>
    <div class="header-title">AN APK Store</div>
    <div class="header-actions">
      <button class="icon-btn" id="bg-picker-btn" onclick="toggleBgPanel()" title="Change Background">🎨</button>
      <button class="icon-btn" id="settings-btn" title="Admin Panel">⚙️</button>
    </div>
  </header>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search apps…" />
  </div>

  <div class="cat-scroll" id="cat-scroll"></div>
  <div class="section-title">📦 All Apps <span id="app-count"></span></div>
  <div class="apps-grid" id="apps-grid"></div>
</div>

<div class="overlay" id="app-detail-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">App Details</div>
      <button class="modal-close" onclick="closeModal('app-detail-overlay')">✕</button>
    </div>
    <div id="app-detail-body"></div>
  </div>
</div>

<div class="overlay" id="payment-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">💳 Purchase App</div>
      <button class="modal-close" onclick="closeModal('payment-overlay')">✕</button>
    </div>
    <div id="payment-body"></div>
  </div>
</div>

<div class="overlay" id="login-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Admin Access</div>
      <button class="modal-close" onclick="closeModal('login-overlay')">✕</button>
    </div>
    <div class="login-box">
      <div class="login-logo" id="login-logo-display">AN</div>
      <div class="login-title" id="login-heading">Welcome Back</div>
      <div class="login-sub" id="login-sub">Sign in to manage your store</div>
      <div id="login-form-area"></div>
    </div>
  </div>
</div>

<div class="overlay" id="admin-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⚙️ Admin Panel</div>
      <button class="modal-close" onclick="closeModal('admin-overlay')">✕</button>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="showAdminTab('apps',this)">📦 Apps</button>
      <button class="admin-tab" onclick="showAdminTab('add-app',this)">➕ Add App</button>
      <button class="admin-tab" onclick="showAdminTab('payments',this)">💳 Payments</button>
      <button class="admin-tab" onclick="showAdminTab('settings-tab',this)">🛠️ Settings</button>
    </div>
    <div id="admin-panel-body"></div>
  </div>
</div>

<input type="file" id="logo-upload-input" accept="image/*" style="display:none" />
<input type="file" id="app-icon-upload-input" accept="image/*" style="display:none" />
<input type="file" id="pm-icon-upload-input" accept="image/*" style="display:none" />

<script>
const CATEGORIES = [
  'All','Action','Adventure','Arcade','Board','Card','Casino','Casual',
  'Educational','Music','Puzzle','Racing','Role Playing','Simulation',
  'Sports','Strategy','Trivia','Word','Tools','Social','Shopping',
  'Productivity','News','Music & Audio','Maps & Navigation','Lifestyle',
  'Health & Fitness','Finance','Entertainment','Communication','Business',
  'Art & Design','Auto & Vehicles','Beauty','Books & Reference','Dating',
  'Events','Food & Drink','House & Home','Libraries & Demo','Medical',
  'Parenting','Personalization','Photography','Travel & Local','Video Players',
  'Weather','Other'
];

let state = {
  apps: [], paymentMethods: [], adminUser: null,
  logo: null, telegram: '', isAdmin: false,
  currentCategory: 'All', currentSearch: '',
  editingApp: null, editingPM: null,
  tempAppIcon: null, tempPMIcon: null,
  selectedPaymentMethod: null, currentPaidApp: null,
  bgConfig: { type: 'solid', value: '#0d0f14' }
};

function saveState() {
  localStorage.setItem('an_apps', JSON.stringify(state.apps));
  localStorage.setItem('an_payments', JSON.stringify(state.paymentMethods));
  localStorage.setItem('an_admin', JSON.stringify(state.adminUser));
  localStorage.setItem('an_logo', state.logo || '');
  localStorage.setItem('an_telegram', state.telegram || '');
  localStorage.setItem('an_bgconfig', JSON.stringify(state.bgConfig));
}
function loadState() {
  try { state.apps = JSON.parse(localStorage.getItem('an_apps') || '[]'); } catch(e){ state.apps=[]; }
  try { state.paymentMethods = JSON.parse(localStorage.getItem('an_payments') || '[]'); } catch(e){ state.paymentMethods=[]; }
  try { state.adminUser = JSON.parse(localStorage.getItem('an_admin') || 'null'); } catch(e){ state.adminUser=null; }
  try { state.bgConfig = JSON.parse(localStorage.getItem('an_bgconfig') || 'null') || { type:'solid', value:'#0d0f14' }; } catch(e){ state.bgConfig={ type:'solid', value:'#0d0f14' }; }
  state.logo = localStorage.getItem('an_logo') || null;
  state.telegram = localStorage.getItem('an_telegram') || '';
}

const SOLID_PALETTE = [
  '#0d0f14','#0f172a','#1a0533','#0a1628','#051f1a','#1a0a00',
  '#000000','#0e1117','#1c1c2e','#120028','#001a1a','#1a1200',
  '#1a2744','#2d1b69','#0c2340','#1a0d2e','#002b36','#1a1a1a',
  '#0d1f0d','#1f0d0d','#0d1a2e','#1f1a0d','#0d1f1a','#2e0d1f',
];

const GRADIENT_PRESETS = [
  { label:'Deep Purple',  value:'linear-gradient(135deg,#0d0f14 0%,#1a0533 50%,#0d0f14 100%)' },
  { label:'Midnight Blue', value:'linear-gradient(135deg,#0a1628 0%,#1a2744 50%,#0a1628 100%)' },
  { label:'Dark Teal',    value:'linear-gradient(135deg,#051f1a 0%,#0a3d2e 50%,#051f1a 100%)' },
  { label:'Cosmic',       value:'linear-gradient(135deg,#120028 0%,#2d1b69 50%,#0a0015 100%)' },
  { label:'Abyss',        value:'linear-gradient(135deg,#000000 0%,#0d0f14 40%,#1a0533 100%)' },
  { label:'Forest Night', value:'linear-gradient(135deg,#0d1f0d 0%,#1a3a1a 50%,#0d1f0d 100%)' },
  { label:'Crimson Dark', value:'linear-gradient(135deg,#1f0d0d 0%,#3a1010 50%,#1f0d0d 100%)' },
  { label:'Aurora',       value:'linear-gradient(135deg,#0d1f1a 0%,#0a2d3a 30%,#1a0d2e 70%,#0d1f1a 100%)' },
];

function buildPalette() {
  const grid = document.getElementById('palette-grid');
  grid.innerHTML = SOLID_PALETTE.map((c,i) => `
    <div class="palette-swatch" style="background:${c}" title="${c}"
      id="swatch-${i}" onclick="applyBgColor('${c}','solid')"></div>
  `).join('');
  const gg = document.getElementById('gradient-grid');
  gg.innerHTML = GRADIENT_PRESETS.map((g,i) => `
    <div class="gradient-swatch" style="background:${g.value}" title="${g.label}"
      id="gswatch-${i}" onclick="applyBgGradient(${i})">
      <span>${g.label}</span>
    </div>
  `).join('');
  syncPaletteActive();
}

function syncPaletteActive() {
  SOLID_PALETTE.forEach((c,i) => {
    const el = document.getElementById(`swatch-${i}`);
    if(el) el.classList.toggle('active', state.bgConfig.type==='solid' && state.bgConfig.value===c);
  });
  GRADIENT_PRESETS.forEach((g,i) => {
    const el = document.getElementById(`gswatch-${i}`);
    if(el) el.classList.toggle('active', state.bgConfig.type==='gradient' && state.bgConfig.value===g.value);
  });
}

function applyBgColor(hex, type='solid') {
  state.bgConfig = { type, value: hex };
  applyBgToDOM();
  syncPaletteActive();
  saveState();
  const picker = document.getElementById('custom-color-picker');
  const hexInput = document.getElementById('custom-hex');
  if(picker) picker.value = hex;
  if(hexInput) hexInput.value = hex;
}

function applyBgGradient(idx) {
  const val = GRADIENT_PRESETS[idx].value;
  state.bgConfig = { type:'gradient', value: val };
  applyBgToDOM();
  syncPaletteActive();
  saveState();
}

function applyBgToDOM() {
  const body = document.body;
  const cfg = state.bgConfig;
  if (cfg.type === 'gradient') {
    body.style.background = cfg.value;
    body.classList.add('has-gradient');
    const hex = extractFirstHexFromGradient(cfg.value) || '#0d0f14';
    setCSSBg(hex);
  } else {
    body.style.background = cfg.value;
    body.classList.remove('has-gradient');
    setCSSBg(cfg.value);
  }
  const loader = document.getElementById('loader');
  if(loader) loader.style.background = cfg.type === 'gradient' ? cfg.value : cfg.value;
}

function setCSSBg(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const lighten = (amt) => `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
  document.documentElement.style.setProperty('--bg', hex);
  document.documentElement.style.setProperty('--surface', lighten(9));
  document.documentElement.style.setProperty('--surface2', lighten(17));
  document.documentElement.style.setProperty('--surface3', lighten(25));
  document.documentElement.style.setProperty('--border', lighten(30));
  const hdr = document.querySelector('header');
  if(hdr) hdr.style.background = `rgba(${r},${g},${b},0.92)`;
}

function extractFirstHexFromGradient(grad) {
  const match = grad.match(/#([0-9a-fA-F]{6})/);
  return match ? match[0] : null;
}

function applyCustomColor() {
  const hexInput = document.getElementById('custom-hex');
  let val = hexInput.value.trim();
  if (!val.startsWith('#')) val = '#' + val;
  if (!/^#[0-9a-fA-F]{6}$/.test(val)) { showToast('Invalid hex color', 'error'); return; }
  applyBgColor(val, 'solid');
  showToast('Color applied!', 'success');
}

function resetBackground() {
  state.bgConfig = { type:'solid', value:'#0d0f14' };
  document.documentElement.style.setProperty('--bg','#0d0f14');
  document.documentElement.style.setProperty('--surface','#161a23');
  document.documentElement.style.setProperty('--surface2','#1e2330');
  document.documentElement.style.setProperty('--surface3','#252b3b');
  document.documentElement.style.setProperty('--border','#2a3045');
  document.body.style.background = '#0d0f14';
  document.body.classList.remove('has-gradient');
  document.querySelector('header').style.background = 'rgba(13,15,20,0.92)';
  document.getElementById('loader').style.background = '#0d0f14';
  const picker = document.getElementById('custom-color-picker');
  const hexInput = document.getElementById('custom-hex');
  if(picker) picker.value = '#0d0f14';
  if(hexInput) hexInput.value = '#0d0f14';
  syncPaletteActive();
  saveState();
  showToast('Background reset', 'info');
}

document.getElementById('custom-color-picker').addEventListener('input', function(){
  document.getElementById('custom-hex').value = this.value;
});
document.getElementById('custom-hex').addEventListener('input', function(){
  const v = this.value.trim();
  if(/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById('custom-color-picker').value = v;
});

let bgPanelOpen = false;
function toggleBgPanel() {
  bgPanelOpen = !bgPanelOpen;
  const panel = document.getElementById('bg-panel');
  panel.classList.toggle('open', bgPanelOpen);
  if(bgPanelOpen) buildPalette();
}

document.addEventListener('click', function(e) {
  if (!bgPanelOpen) return;
  const panel = document.getElementById('bg-panel');
  const btn = document.getElementById('bg-picker-btn');
  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    bgPanelOpen = false;
    panel.classList.remove('open');
  }
});

function showToast(msg, type='info') {
  const tc = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  t.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  tc.appendChild(t);
  setTimeout(() => {
    t.style.transition='all .3s'; t.style.opacity='0'; t.style.transform='translateX(100%)';
    setTimeout(()=>t.remove(),300);
  }, 3000);
}

function openModal(id) {
  const el = document.getElementById(id);
  el.style.display = 'flex';
  requestAnimationFrame(()=>el.classList.add('open'));
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('open');
  setTimeout(()=>{ el.style.display='none'; },200);
  document.body.style.overflow = '';
}

function updateLogoUI() {
  const hBtn = document.getElementById('header-logo-btn');
  const lLogo = document.getElementById('login-logo-display');
  if (state.logo) {
    hBtn.innerHTML = `<img src="${state.logo}" alt="logo" />`;
    if(lLogo) lLogo.innerHTML = `<img src="${state.logo}" alt="logo" />`;
  } else {
    hBtn.innerHTML = 'AN';
    if(lLogo) lLogo.innerHTML = 'AN';
  }
}
document.getElementById('logo-upload-input').addEventListener('change', function(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    state.logo = ev.target.result; saveState(); updateLogoUI();
    showToast('Logo updated!','success');
    const prev = document.getElementById('logo-preview');
    if(prev) prev.innerHTML = `<img src="${state.logo}" />`;
  };
  reader.readAsDataURL(file); this.value='';
});

function getFilteredApps() {
  return state.apps.filter(app => {
    const matchCat = state.currentCategory==='All' || app.category===state.currentCategory;
    const matchSearch = app.name.toLowerCase().includes(state.currentSearch.toLowerCase());
    return matchCat && matchSearch;
  });
}
function renderApps() {
  const grid = document.getElementById('apps-grid');
  const filtered = getFilteredApps();
  document.getElementById('app-count').textContent = `(${filtered.length})`;
  if(filtered.length===0){
    grid.innerHTML=`<div class="empty-state"><div class="es-icon">📭</div><p>No apps found</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(app=>`
    <div class="app-card" onclick="openAppDetail('${app.id}')">
      <div class="app-icon">${app.icon?`<img src="${app.icon}"/>`:(app.emoji||'📦')}</div>
      <div class="app-name">${app.name}</div>
      <div class="app-cat">${app.category}</div>
      <div class="app-downloads">⬇️ ${app.downloads||0} downloads</div>
      <div class="app-meta">
        <span class="app-size">${app.size||'—'}</span>
        <span class="badge ${app.type==='FREE'?'badge-free':'badge-paid'}">${app.type}</span>
      </div>
    </div>
  `).join('');
}

function renderCategories() {
  const usedCats = ['All', ...new Set(state.apps.map(a=>a.category))];
  document.getElementById('cat-scroll').innerHTML = usedCats.map(cat=>`
    <button class="cat-pill ${state.currentCategory===cat?'active':''}" onclick="filterCategory('${cat}')">${cat}</button>
  `).join('');
}
function filterCategory(cat) {
  state.currentCategory=cat; renderCategories(); renderApps();
}
document.getElementById('search-input').addEventListener('input', function(){
  state.currentSearch=this.value; renderApps();
});

function openAppDetail(id) {
  const app = state.apps.find(a=>a.id===id); if(!app) return;
  const hasLink = app.downloadLink && app.downloadLink.trim()!=='';
  document.getElementById('app-detail-body').innerHTML = `
    <div class="app-detail-header">
      <div class="app-detail-icon">${app.icon?`<img src="${app.icon}"/>`:(app.emoji||'📦')}</div>
      <div class="app-detail-info">
        <div class="app-detail-name">${app.name}</div>
        <div class="app-detail-cat">${app.category}</div>
        <div class="app-detail-badges">
          <span class="badge ${app.type==='FREE'?'badge-free':'badge-paid'}">${app.type}</span>
          ${app.version?`<span class="badge" style="background:rgba(108,99,255,.15);color:var(--accent2);border:1px solid rgba(108,99,255,.3)">v${app.version}</span>`:''}
        </div>
      </div>
    </div>
    <div class="detail-row">
      ${app.version?`<div class="detail-chip"><span class="detail-chip-label">Version</span><span class="detail-chip-val">${app.version}</span></div>`:''}
      ${app.size?`<div class="detail-chip"><span class="detail-chip-label">Size</span><span class="detail-chip-val">${app.size}</span></div>`:''}
      <div class="detail-chip"><span class="detail-chip-label">Type</span><span class="detail-chip-val">${app.type}</span></div>
      <div class="detail-chip"><span class="detail-chip-label">Downloads</span><span class="detail-chip-val">${app.downloads||0}</span></div>
      ${app.type==='PAID'?`<div class="detail-chip"><span class="detail-chip-label">Price</span><span class="detail-chip-val" style="color:var(--yellow)">${app.price}</span></div>`:''}
    </div>
    ${app.description?`<div class="app-description">${app.description}</div>`:''}
    ${app.type==='FREE'
      ? (hasLink
        ? `<button class="btn btn-green" id="dl-btn-${app.id}" onclick="downloadApp('${app.id}')">⬇️ Free Download</button>
           <div class="download-progress-wrap" id="dl-progress-${app.id}">
             <div class="download-progress-bar-bg"><div class="download-progress-bar" id="dl-bar-${app.id}"></div></div>
             <div class="download-progress-text" id="dl-text-${app.id}">Preparing download...</div>
           </div>`
        : `<button class="btn btn-green" disabled style="opacity:.5;cursor:not-allowed">⬇️ Download Not Available</button>
           <p style="font-size:.78rem;color:var(--muted);text-align:center;margin-top:8px">Download link not set by admin yet.</p>`)
      :`<div class="price-tag">${app.price||'Paid'}</div>
        <button class="btn btn-yellow" onclick="openPayment('${app.id}')">💳 Buy Now</button>`}
  `;
  openModal('app-detail-overlay');
}

function downloadApp(appId) {
  const app = state.apps.find(a=>a.id===appId);
  if(!app || !app.downloadLink || app.downloadLink.trim()===''){
    showToast('No download link available','error');
    return;
  }
  // Show progress animation
  const progressWrap = document.getElementById(`dl-progress-${appId}`);
  const progressBar = document.getElementById(`dl-bar-${appId}`);
  const progressText = document.getElementById(`dl-text-${appId}`);
  const dlBtn = document.getElementById(`dl-btn-${appId}`);
  if(progressWrap) progressWrap.classList.add('active');
  if(dlBtn) { dlBtn.disabled = true; dlBtn.style.opacity = '.6'; dlBtn.innerHTML = '⏳ Downloading...'; }

  let progress = 0;
  const interval = setInterval(()=>{
    progress += Math.random() * 15 + 5;
    if(progress > 90) progress = 90;
    if(progressBar) progressBar.style.width = progress + '%';
    if(progressText) progressText.textContent = Math.round(progress) + '% downloading...';
  }, 300);

  // Increment download count
  app.downloads = (app.downloads || 0) + 1;
  saveState();

  setTimeout(()=>{
    clearInterval(interval);
    if(progressBar) progressBar.style.width = '100%';
    if(progressText) progressText.textContent = '100% — Download complete!';
    if(dlBtn) { dlBtn.innerHTML = '✅ Downloaded'; dlBtn.style.background = 'linear-gradient(135deg, #16a34a, #22c55e)'; }
    showToast(`${app.name} download started!`, 'success');
    // Trigger actual download
    const a = document.createElement('a');
    a.href = app.downloadLink;
    a.target = '_blank';
    a.download = '';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    renderApps();
  }, 2000);
}

function openPayment(appId) {
  const app=state.apps.find(a=>a.id===appId); if(!app) return;
  state.currentPaidApp=app; state.selectedPaymentMethod=null;
  renderPaymentStep1(); closeModal('app-detail-overlay'); openModal('payment-overlay');
}
function renderPaymentStep1() {
  const body=document.getElementById('payment-body');
  if(state.paymentMethods.length===0){
    body.innerHTML=`<div class="empty-state"><div class="es-icon">💳</div><p>No payment methods configured.</p></div>`;return;
  }
  body.innerHTML=`
    <div style="margin-bottom:16px">
      <div class="form-label" style="font-size:.9rem;color:var(--text)">Purchasing: <strong>${state.currentPaidApp.name}</strong></div>
      <div class="form-label" style="font-size:.9rem;color:var(--yellow)">Price: <strong>${state.currentPaidApp.price}</strong></div>
    </div>
    <div class="form-label">Select Payment Method</div>
    <div id="pm-list">
      ${state.paymentMethods.map(pm=>`
        <div class="payment-method-card" id="pmc-${pm.id}" onclick="selectPaymentMethod('${pm.id}')">
          <div class="pm-icon">${pm.icon?`<img src="${pm.icon}"/>`:'💳'}</div>
          <div class="pm-info"><div class="pm-name">${pm.name}</div><div class="pm-number">${pm.number}</div></div>
          <div class="pm-selected-dot"></div>
        </div>
      `).join('')}
    </div>
    <div id="pm-instructions-area"></div>
    <div id="pm-txn-area" style="display:none">
      <hr class="divider"/>
      <div class="form-group">
        <label class="form-label">Transaction ID</label>
        <input type="text" class="form-input" id="txn-input" placeholder="Enter your transaction ID…"/>
      </div>
      <button class="btn btn-primary" onclick="submitPayment()">✅ Submit Payment</button>
    </div>
  `;
}
function selectPaymentMethod(pmId) {
  state.selectedPaymentMethod=state.paymentMethods.find(p=>p.id===pmId);
  document.querySelectorAll('.payment-method-card').forEach(el=>el.classList.remove('selected'));
  document.getElementById(`pmc-${pmId}`).classList.add('selected');
  const instrArea=document.getElementById('pm-instructions-area');
  instrArea.innerHTML = state.selectedPaymentMethod?.instructions
    ? `<div class="pm-instructions">📋 ${state.selectedPaymentMethod.instructions}</div>` : '';
  document.getElementById('pm-txn-area').style.display='block';
}
function submitPayment() {
  const txn=document.getElementById('txn-input').value.trim();
  if(!txn){showToast('Please enter a Transaction ID','error');return;}
  document.getElementById('payment-body').innerHTML=`
    <div class="success-box">
      <div class="success-icon">✅</div>
      <div class="success-title">Payment Submitted!</div>
      <div class="success-sub">
        Your payment for <strong>${state.currentPaidApp.name}</strong> has been submitted.<br/>
        Transaction ID: <strong style="color:var(--accent)">${txn}</strong><br/><br/>
        Contact us on Telegram to receive your app after verification.
      </div>
      ${state.telegram
        ?`<button class="btn btn-telegram" onclick="window.open('${state.telegram}','_blank')">📲 Contact on Telegram</button>`
        :`<p style="color:var(--muted);font-size:.85rem">Telegram not configured.</p>`}
    </div>
  `;
}

document.getElementById('settings-btn').addEventListener('click',()=>{
  if(state.isAdmin) openAdminPanel(); else openLoginModal();
});
function openLoginModal(){renderLoginForm(false);openModal('login-overlay');}
function renderLoginForm(isRegister){
  const area=document.getElementById('login-form-area');
  const heading=document.getElementById('login-heading');
  const sub=document.getElementById('login-sub');
  const logoEl=document.getElementById('login-logo-display');
  if(state.logo) logoEl.innerHTML=`<img src="${state.logo}"/>`; else logoEl.innerHTML='AN';
  if(isRegister){
    heading.textContent='Create Admin Account'; sub.textContent='Set up your admin credentials';
    area.innerHTML=`
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="reg-email" placeholder="admin@example.com"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="reg-pass" placeholder="••••••••"/></div>
      <div class="form-group"><label class="form-label">Confirm Password</label><input class="form-input" type="password" id="reg-pass2" placeholder="••••••••"/></div>
      <div id="reg-err" class="error-msg" style="display:none"></div>
      <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
      <div class="login-switch">Already have an account? <span onclick="renderLoginForm(false)">Sign In</span></div>
    `;
  } else {
    heading.textContent='Welcome Back'; sub.textContent='Sign in to manage your store';
    area.innerHTML=`
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="login-email" placeholder="admin@example.com"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="login-pass" placeholder="••••••••"/></div>
      <div id="login-err" class="error-msg" style="display:none"></div>
      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
      ${!state.adminUser?`<div class="login-switch">No account? <span onclick="renderLoginForm(true)">Register</span></div>`:''}
    `;
  }
}
function doRegister(){
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  const err=document.getElementById('reg-err');
  if(!email||!pass){err.textContent='Please fill all fields.';err.style.display='block';return;}
  if(pass!==pass2){err.textContent='Passwords do not match.';err.style.display='block';return;}
  if(pass.length<6){err.textContent='Password must be at least 6 characters.';err.style.display='block';return;}
  if(state.adminUser){err.textContent='Admin already exists. Sign in.';err.style.display='block';return;}
  state.adminUser={email,pass}; saveState(); state.isAdmin=true;
  showToast('Account created!','success'); closeModal('login-overlay'); setTimeout(openAdminPanel,300);
}
function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  if(!state.adminUser){err.textContent='No admin account found. Please register.';err.style.display='block';return;}
  if(state.adminUser.email!==email||state.adminUser.pass!==pass){err.textContent='Invalid email or password.';err.style.display='block';return;}
  state.isAdmin=true; showToast('Logged in ✅','success'); closeModal('login-overlay'); setTimeout(openAdminPanel,300);
}

function openAdminPanel(){
  showAdminTab('apps',document.querySelector('.admin-tab')); openModal('admin-overlay');
}
function showAdminTab(tab,btn){
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const body=document.getElementById('admin-panel-body');
  if(tab==='apps') renderAdminApps(body);
  else if(tab==='add-app') renderAddAppForm(body,null);
  else if(tab==='payments') renderAdminPayments(body);
  else if(tab==='settings-tab') renderAdminSettings(body);
}

function renderAdminApps(body){
  if(state.apps.length===0){body.innerHTML=`<div class="empty-state"><div class="es-icon">📦</div><p>No apps yet.</p></div>`;return;}
  body.innerHTML=state.apps.map(app=>`
    <div class="admin-app-row">
      <div class="aa-icon">${app.icon?`<img src="${app.icon}"/>`:(app.emoji||'📦')}</div>
      <div class="aa-info">
        <div class="aa-name">${app.name}</div>
        <div class="aa-meta">${app.category} · ${app.type}${app.type==='PAID'?' · '+app.price:''} · ${app.size||'—'} · ⬇️${app.downloads||0}</div>
      </div>
      <div class="aa-actions">
        <button class="btn btn-outline btn-sm" onclick="editApp('${app.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteApp('${app.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
}
function deleteApp(id){
  if(!confirm('Delete this app?')) return;
  state.apps=state.apps.filter(a=>a.id!==id); saveState(); renderApps(); renderCategories();
  showToast('App deleted','success'); renderAdminApps(document.getElementById('admin-panel-body'));
}
function editApp(id){
  state.editingApp=state.apps.find(a=>a.id===id)||null;
  renderAddAppForm(document.getElementById('admin-panel-body'),state.editingApp);
  document.querySelectorAll('.admin-tab').forEach((b,i)=>b.classList.toggle('active',i===1));
}

function renderAddAppForm(body,app){
  const isEdit=!!app; state.tempAppIcon=app?app.icon:null;
  body.innerHTML=`
    <div style="font-weight:700;margin-bottom:16px;color:var(--accent)">${isEdit?'✏️ Edit App':'➕ Add New App'}</div>
    <div style="display:flex;gap:14px;align-items:center;margin-bottom:16px">
      <div class="icon-upload-box" id="app-icon-preview" onclick="triggerAppIconUpload()">
        ${state.tempAppIcon?`<img src="${state.tempAppIcon}"/>`:'📦'}
      </div>
      <div>
        <div style="font-size:.82rem;color:var(--muted)">App Icon</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:4px">Tap to upload</div>
      </div>
      <div class="form-group" style="margin:0;flex:1">
        <label class="form-label">Emoji Icon (fallback)</label>
        <input class="form-input" type="text" id="app-emoji" placeholder="📦" maxlength="4" value="${isEdit&&app.emoji?app.emoji:''}"/>
      </div>
    </div>
    <div class="form-group"><label class="form-label">App Name *</label><input class="form-input" type="text" id="app-name" placeholder="My Awesome App" value="${isEdit?app.name:''}"/></div>
    <div class="form-group"><label class="form-label">Category *</label>
      <select class="form-input" id="app-cat">
        ${CATEGORIES.filter(c=>c!=='All').map(c=>`<option value="${c}" ${isEdit&&app.category===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label class="form-label">Version</label><input class="form-input" type="text" id="app-version" placeholder="1.0.0" value="${isEdit?app.version:''}"/></div>
      <div class="form-group"><label class="form-label">Size</label><input class="form-input" type="text" id="app-size" placeholder="24 MB" value="${isEdit?app.size:''}"/></div>
    </div>
    <div class="form-group"><label class="form-label">Type *</label>
      <select class="form-input" id="app-type" onchange="togglePriceField()">
        <option value="FREE" ${isEdit&&app.type==='FREE'?'selected':''}>FREE</option>
        <option value="PAID" ${isEdit&&app.type==='PAID'?'selected':''}>PAID</option>
      </select>
    </div>
    <div class="form-group" id="price-field" style="${isEdit&&app.type==='PAID'?'':'display:none'}">
      <label class="form-label">Price</label>
      <input class="form-input" type="text" id="app-price" placeholder="$2.99" value="${isEdit&&app.price?app.price:''}"/>
    </div>
    <div class="form-group">
      <label class="form-label">Download Link *</label>
      <input class="form-input" type="url" id="app-link" placeholder="https://drive.google.com/… or direct APK link" value="${isEdit&&app.downloadLink?app.downloadLink:''}"/>
      <div style="font-size:.72rem;color:var(--muted);margin-top:4px">⚠️ Google Drive, Mediafire, direct .apk link, or any URL</div>
    </div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="app-desc">${isEdit&&app.description?app.description:''}</textarea></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="saveApp(${isEdit?`'${app.id}'`:'null'})">${isEdit?'💾 Save Changes':'➕ Add App'}</button>
      ${isEdit?`<button class="btn btn-outline" onclick="renderAdminApps(document.getElementById('admin-panel-body'))">Cancel</button>`:''}
    </div>
  `;
}
function togglePriceField(){
  document.getElementById('price-field').style.display=document.getElementById('app-type').value==='PAID'?'':'none';
}
function triggerAppIconUpload(){document.getElementById('app-icon-upload-input').click();}
document.getElementById('app-icon-upload-input').addEventListener('change',function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    state.tempAppIcon=ev.target.result;
    const prev=document.getElementById('app-icon-preview');
    if(prev) prev.innerHTML=`<img src="${state.tempAppIcon}"/>`;
  };
  reader.readAsDataURL(file); this.value='';
});
function saveApp(editId){
  const name=document.getElementById('app-name').value.trim();
  const cat=document.getElementById('app-cat').value;
  const type=document.getElementById('app-type').value;
  const version=document.getElementById('app-version').value.trim();
  const size=document.getElementById('app-size').value.trim();
  const price=type==='PAID'?(document.getElementById('app-price')?.value.trim()||''):'';
  const link=document.getElementById('app-link').value.trim();
  const desc=document.getElementById('app-desc').value.trim();
  const emoji=document.getElementById('app-emoji').value.trim();
  if(!name){showToast('App name is required','error');return;}
  if(type==='PAID'&&!price){showToast('Please enter a price','error');return;}
  if(!link){showToast('Download link is required','error');return;}
  if(editId){
    const idx=state.apps.findIndex(a=>a.id===editId);
    if(idx>=0) state.apps[idx]={...state.apps[idx],name,category:cat,type,version,size,price,downloadLink:link,description:desc,emoji,icon:state.tempAppIcon||state.apps[idx].icon};
    showToast('App updated!','success');
  } else {
    state.apps.unshift({id:'app_'+Date.now(),name,category:cat,type,version,size,price,downloadLink:link,description:desc,emoji:emoji||'📦',icon:state.tempAppIcon||null,downloads:0});
    showToast('App added!','success');
  }
  state.tempAppIcon=null; saveState(); renderApps(); renderCategories();
  renderAdminApps(document.getElementById('admin-panel-body'));
  document.querySelectorAll('.admin-tab').forEach((b,i)=>b.classList.toggle('active',i===0));
}

function renderAdminPayments(body){
  body.innerHTML=`
    <div style="font-weight:700;margin-bottom:12px;color:var(--accent)">💳 Payment Methods</div>
    <div id="pm-admin-list">
      ${state.paymentMethods.length===0
        ?`<div class="empty-state" style="padding:30px 0"><p>No payment methods yet</p></div>`
        :state.paymentMethods.map(pm=>`
          <div class="pm-admin-row">
            <div class="pma-icon">${pm.icon?`<img src="${pm.icon}"/>`:'💳'}</div>
            <div class="pma-info"><div class="pma-name">${pm.name}</div><div class="pma-num">${pm.number}</div></div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-outline btn-sm" onclick="editPM('${pm.id}')">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deletePM('${pm.id}')">🗑️</button>
            </div>
          </div>
        `).join('')}
    </div>
    <hr class="divider"/>
    <div style="font-weight:700;margin-bottom:12px;color:var(--accent)" id="pm-form-title">➕ Add Payment Method</div>
    <div id="pm-add-form">${renderPMForm(null)}</div>
  `;
}
function renderPMForm(pm){
  state.tempPMIcon=pm?pm.icon:null;
  return `
    <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px">
      <div class="icon-upload-box" id="pm-icon-preview" style="width:60px;height:60px" onclick="triggerPMIconUpload()">
        ${state.tempPMIcon?`<img src="${state.tempPMIcon}"/>`:'💳'}
      </div>
      <div style="font-size:.8rem;color:var(--muted)">Tap to upload icon</div>
    </div>
    <div class="form-group"><label class="form-label">Method Name</label><input class="form-input" type="text" id="pm-name" placeholder="bKash / Nagad / Rocket" value="${pm?pm.name:''}"/></div>
    <div class="form-group"><label class="form-label">Account Number</label><input class="form-input" type="text" id="pm-number" placeholder="+880 1XXX-XXXXXX" value="${pm?pm.number:''}"/></div>
    <div class="form-group"><label class="form-label">Payment Instructions</label><textarea class="form-input" id="pm-instructions">${pm?pm.instructions:''}</textarea></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="savePM(${pm?`'${pm.id}'`:'null'})">${pm?'💾 Update':'➕ Add'}</button>
      ${pm?`<button class="btn btn-outline" onclick="renderAdminPayments(document.getElementById('admin-panel-body'))">Cancel</button>`:''}
    </div>
  `;
}
function triggerPMIconUpload(){document.getElementById('pm-icon-upload-input').click();}
document.getElementById('pm-icon-upload-input').addEventListener('change',function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    state.tempPMIcon=ev.target.result;
    const prev=document.getElementById('pm-icon-preview');
    if(prev) prev.innerHTML=`<img src="${state.tempPMIcon}"/>`;
  };
  reader.readAsDataURL(file); this.value='';
});
function savePM(editId){
  const name=document.getElementById('pm-name').value.trim();
  const number=document.getElementById('pm-number').value.trim();
  const instructions=document.getElementById('pm-instructions').value.trim();
  if(!name||!number){showToast('Name and number are required','error');return;}
  if(editId){
    const idx=state.paymentMethods.findIndex(p=>p.id===editId);
    if(idx>=0) state.paymentMethods[idx]={...state.paymentMethods[idx],name,number,instructions,icon:state.tempPMIcon||state.paymentMethods[idx].icon};
    showToast('Payment method updated!','success');
  } else {
    state.paymentMethods.push({id:'pm_'+Date.now(),name,number,instructions,icon:state.tempPMIcon||null});
    showToast('Payment method added!','success');
  }
  state.tempPMIcon=null; saveState(); renderAdminPayments(document.getElementById('admin-panel-body'));
}
function editPM(id){
  const pm=state.paymentMethods.find(p=>p.id===id); if(!pm) return;
  document.getElementById('pm-form-title').textContent='✏️ Edit Payment Method';
  document.getElementById('pm-add-form').innerHTML=renderPMForm(pm);
}
function deletePM(id){
  if(!confirm('Delete this payment method?')) return;
  state.paymentMethods=state.paymentMethods.filter(p=>p.id!==id); saveState();
  showToast('Deleted','success'); renderAdminPayments(document.getElementById('admin-panel-body'));
}

function renderAdminSettings(body){
  body.innerHTML=`
    <div style="font-weight:700;margin-bottom:16px;color:var(--accent)">🛠️ Store Settings</div>
    <div class="form-group">
      <label class="form-label">Store Logo</label>
      <div style="display:flex;gap:14px;align-items:center">
        <div class="icon-upload-box" id="logo-preview" style="width:70px;height:70px">
          ${state.logo?`<img src="${state.logo}"/>`:'AN'}
        </div>
        <div>
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('logo-upload-input').click()">📁 Upload Logo</button>
          ${state.logo?`<button class="btn btn-danger btn-sm" style="margin-top:8px" onclick="removeLogo()">🗑️ Remove</button>`:''}
        </div>
      </div>
    </div>
    <hr class="divider"/>
    <div class="form-group">
      <label class="form-label">📲 Telegram Link</label>
      <input class="form-input" type="url" id="tg-link" placeholder="https://t.me/yourusername" value="${state.telegram||''}"/>

    <button class="btn btn-primary" style="width:auto;padding:10px 24px" onclick="saveTelegram()">💾 Save Telegram</button>

    <div class="form-group">

      <input class="form-input" type="password" id="new-pass" placeholder="New password…" style="margin-bottom:10px"/>

  `;
}
function removeLogo(){ state.logo=null; saveState(); updateLogoUI(); showToast('Logo removed','success'); renderAdminSettings(document.getElementById('admin-panel-body')); }
function saveTelegram(){ state.telegram=document.getElementById('tg-link').value.trim(); saveState(); showToast('Telegram link saved!','success'); }
function changePass(){
  const np=document.getElementById('new-pass').value;
  const np2=document.getElementById('new-pass2').value;
  if(!np||np.length<6){showToast('Password must be at least 6 characters','error');return;}
  if(np!==np2){showToast('Passwords do not match','error');return;}
  state.adminUser.pass=np; saveState(); showToast('Password updated!','success');
}
function adminLogout(){ state.isAdmin=false; closeModal('admin-overlay'); showToast('Logged out','info'); }

document.querySelectorAll('.overlay').forEach(ov=>{
  ov.addEventListener('click',function(e){ if(e.target===this) closeModal(this.id); });
});

function init(){
  loadState(); loadSampleData(); updateLogoUI(); renderCategories(); renderApps();
  if(state.bgConfig && state.bgConfig.value !== '#0d0f14'){
    applyBgToDOM();
  }
  if(state.bgConfig.type==='solid'){
    document.getElementById('custom-color-picker').value = state.bgConfig.value;
    document.getElementById('custom-hex').value = state.bgConfig.value;
  }
  setTimeout(()=>{
    const loader=document.getElementById('loader');
    loader.classList.add('hidden');
    setTimeout(()=>loader.style.display='none',700);
  },1800);
}
document.addEventListener('DOMContentLoaded', init);
