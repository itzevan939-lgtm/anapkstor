<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ANMODS - APK App Store</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-card: #16161f;
    --bg-modal: #1a1a26;
    --accent-blue: #4f8ef7;
    --accent-green: #00e676;
    --accent-purple: #7c4dff;
    --gradient-main: linear-gradient(135deg, #4f8ef7 0%, #00e676 100%);
    --gradient-card: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    --text-primary: #f0f0f8;
    --text-secondary: #9090b0;
    --text-muted: #5a5a7a;
    --border: #2a2a3e;
    --shadow: 0 8px 32px rgba(79,142,247,0.15);
    --radius: 16px;
    --radius-sm: 10px;
    --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 80px;
  }
  button { cursor: pointer; border: none; outline: none; font-family: inherit; }
  input, textarea { font-family: inherit; outline: none; }
  img { max-width: 100%; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 2px; }

  /* ===== LOADING SCREEN ===== */
  #loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg-primary);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #loader.hide { opacity: 0; visibility: hidden; }
  .loader-logo {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--gradient-main);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 900; color: #fff;
    margin-bottom: 24px;
    box-shadow: 0 0 40px rgba(79,142,247,0.6);
    animation: pulse-glow 1.5s ease-in-out infinite;
  }
  .loader-spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-blue);
    border-right-color: var(--accent-green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  .loader-text {
    color: var(--text-secondary); font-size: 14px;
    letter-spacing: 2px; text-transform: uppercase;
    animation: fade-pulse 1.5s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 40px rgba(79,142,247,0.6); transform: scale(1); }
    50% { box-shadow: 0 0 60px rgba(0,230,118,0.6); transform: scale(1.05); }
  }
  @keyframes fade-pulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }

  /* ===== HEADER ===== */
  #header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .header-logo {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--gradient-main);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900; color: #fff;
    flex-shrink: 0; overflow: hidden;
    box-shadow: 0 0 16px rgba(79,142,247,0.4);
    cursor: pointer;
  }
  .header-logo img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .header-title {
    font-size: 17px; font-weight: 700;
    background: var(--gradient-main);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; white-space: nowrap;
    flex: 1; text-align: center;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--bg-card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: var(--transition);
    position: relative;
  }
  .icon-btn:hover { background: var(--accent-blue); transform: scale(1.08); }
  .notif-badge {
    position: absolute; top: 4px; right: 4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-green);
    border: 1px solid var(--bg-primary);
  }

  /* ===== TOP TABS ===== */
  #top-tabs {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
    display: flex; overflow-x: auto; gap: 4px;
    scrollbar-width: none;
  }
  #top-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 14px 20px; white-space: nowrap;
    background: none; color: var(--text-secondary);
    font-size: 14px; font-weight: 600;
    border-bottom: 2px solid transparent;
    transition: var(--transition); border-radius: 0;
  }
  .tab-btn.active { color: var(--accent-green); border-bottom-color: var(--accent-green); }
  .tab-btn:hover:not(.active) { color: var(--text-primary); }

  /* ===== PAGES ===== */
  .page { display: none; padding: 16px; animation: fadeIn 0.3s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* ===== SECTION TITLES ===== */
  .section-title {
    font-size: 18px; font-weight: 700; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; display: block; width: 4px; height: 18px;
    background: var(--gradient-main); border-radius: 2px;
  }

  /* ===== FEATURED BANNER ===== */
  .featured-banner {
    border-radius: var(--radius); overflow: hidden;
    background: var(--gradient-card); margin-bottom: 24px;
    border: 1px solid var(--border);
    position: relative; padding: 24px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: var(--shadow);
  }
  .featured-banner::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(79,142,247,0.1) 0%, rgba(0,230,118,0.05) 100%);
    pointer-events: none;
  }
  .featured-icon {
    width: 72px; height: 72px; border-radius: 16px;
    background: var(--gradient-main); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(79,142,247,0.3);
  }
  .featured-icon img { width:100%; height:100%; object-fit:cover; }
  .featured-info { flex: 1; min-width: 0; }
  .featured-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--accent-green); text-transform: uppercase; margin-bottom: 4px;
  }
  .featured-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .featured-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-download {
    padding: 8px 20px; border-radius: 24px;
    background: var(--gradient-main);
    color: #000; font-weight: 700; font-size: 13px;
    transition: var(--transition);
    box-shadow: 0 4px 16px rgba(79,142,247,0.3);
    display: inline-block;
  }
  .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,142,247,0.4); }

  /* ===== APP GRID ===== */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px; margin-bottom: 28px;
  }
  .app-card {
    background: var(--bg-card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 14px;
    cursor: pointer; transition: var(--transition);
    position: relative; overflow: hidden;
  }
  .app-card::before {
    content: ''; position: absolute; inset: 0;
    background: var(--gradient-main); opacity: 0;
    transition: opacity 0.3s ease; pointer-events: none;
  }
  .app-card:hover { transform: translateY(-4px); border-color: var(--accent-blue); box-shadow: 0 12px 32px rgba(79,142,247,0.2); }
  .app-card:hover::before { opacity: 0.04; }
  .an-badge {
    position: absolute; top: 8px; right: 8px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--gradient-main);
    display: flex; align-items: center; justify-content: center;
    font-size: 7px; font-weight: 900; color: #000;
    z-index: 2; box-shadow: 0 2px 8px rgba(79,142,247,0.4);
  }
  .app-icon-wrap {
    width: 64px; height: 64px; border-radius: 14px;
    overflow: hidden; margin: 0 auto 10px;
    background: var(--gradient-main);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .app-icon-wrap img { width:100%; height:100%; object-fit:cover; }
  .app-name {
    font-size: 12px; font-weight: 600; text-align: center;
    margin-bottom: 6px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .app-meta {
    display: flex; align-items: center; justify-content: space-between;
    gap: 4px;
  }
  .app-rating { font-size: 11px; color: #ffd700; }
  .app-badge {
    font-size: 9px; font-weight: 700; padding: 2px 7px;
    border-radius: 12px; letter-spacing: 0.5px;
  }
  .badge-free { background: rgba(0,230,118,0.15); color: var(--accent-green); }
  .badge-paid { background: rgba(79,142,247,0.15); color: var(--accent-blue); }

  /* ===== TRENDING ROW ===== */
  .trending-row {
    display: flex; gap: 12px; overflow-x: auto;
    padding-bottom: 8px; scrollbar-width: none; margin-bottom: 24px;
  }
  .trending-row::-webkit-scrollbar { display: none; }
  .trending-card {
    min-width: 130px; background: var(--bg-card);
    border-radius: var(--radius); border: 1px solid var(--border);
    padding: 12px; cursor: pointer; transition: var(--transition);
    position: relative; flex-shrink: 0;
  }
  .trending-card:hover { transform: translateY(-3px); border-color: var(--accent-green); }

  /* ===== CATEGORIES PAGE ===== */
  .categories-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  .cat-item {
    background: var(--bg-card); border-radius: var(--radius-sm);
    border: 1px solid var(--border); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: var(--transition);
  }
  .cat-item:hover { border-color: var(--accent-blue); background: rgba(79,142,247,0.08); transform: scale(1.02); }
  .cat-icon { font-size: 26px; flex-shrink: 0; }
  .cat-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }

  /* ===== SEARCH PAGE ===== */
  .search-wrap { margin-bottom: 16px; position: relative; }
  .search-input {
    width: 100%; padding: 14px 20px 14px 48px;
    border-radius: 24px; background: var(--bg-card);
    border: 1px solid var(--border); color: var(--text-primary);
    font-size: 15px; transition: var(--transition);
  }
  .search-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(79,142,247,0.15); }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 20px; color: var(--text-muted); }
  .search-input::placeholder { color: var(--text-muted); }
  #search-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 14px; }

  /* ===== BOTTOM NAV ===== */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,15,0.97); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-around;
    padding: 10px 0 14px;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; color: var(--text-muted);
    font-size: 10px; font-weight: 600; padding: 4px 12px;
    transition: var(--transition); border-radius: 12px;
  }
  .nav-btn .nav-icon { font-size: 22px; transition: var(--transition); }
  .nav-btn.active { color: var(--accent-green); }
  .nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px var(--accent-green)); }
  .nav-btn:hover { color: var(--text-primary); }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; visibility: hidden; transition: var(--transition);
  }
  .modal-overlay.open { opacity: 1; visibility: visible; }
  .modal-box {
    width: 100%; max-width: 600px; max-height: 90vh;
    background: var(--bg-modal); border-radius: 24px 24px 0 0;
    border: 1px solid var(--border); border-bottom: none;
    overflow-y: auto; transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    scrollbar-width: thin;
  }
  .modal-overlay.open .modal-box { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 12px auto 0;
  }
  .modal-content { padding: 20px; }
  .modal-header { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 20px; }
  .modal-icon {
    width: 80px; height: 80px; border-radius: 18px;
    overflow: hidden; flex-shrink: 0;
    background: var(--gradient-main);
    display: flex; align-items: center; justify-content: center; font-size: 36px;
    box-shadow: 0 8px 24px rgba(79,142,247,0.3);
  }
  .modal-icon img { width:100%; height:100%; object-fit:cover; }
  .modal-info { flex: 1; min-width: 0; }
  .modal-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .modal-category { font-size: 12px; color: var(--accent-blue); font-weight: 600; margin-bottom: 8px; }
  .modal-rating { display: flex; align-items: center; gap: 6px; font-size: 14px; }
  .stars { color: #ffd700; }
  .modal-meta {
    display: flex; gap: 20px; background: var(--bg-card);
    border-radius: var(--radius-sm); padding: 14px; margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .meta-item { flex: 1; text-align: center; }
  .meta-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .meta-val { font-size: 14px; font-weight: 700; }
  .modal-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; margin-bottom: 8px; }
  .btn-primary {
    flex: 1; padding: 14px; border-radius: 14px;
    background: var(--gradient-main); color: #000;
    font-weight: 800; font-size: 15px;
    transition: var(--transition);
    box-shadow: 0 4px 20px rgba(79,142,247,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(79,142,247,0.4); }
  .btn-secondary {
    flex: 1; padding: 14px; border-radius: 14px;
    background: var(--bg-card); color: var(--text-primary);
    font-weight: 700; font-size: 15px;
    border: 1px solid var(--border); transition: var(--transition);
  }
  .btn-secondary:hover { border-color: var(--accent-blue); }

  /* ===== PAYMENT MODAL ===== */
  .payment-methods { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .payment-method {
    background: var(--bg-card); border-radius: var(--radius-sm);
    border: 1px solid var(--border); padding: 14px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: var(--transition);
  }
  .payment-method:hover, .payment-method.selected { border-color: var(--accent-blue); background: rgba(79,142,247,0.08); }
  .pay-icon-wrap {
    width: 48px; height: 48px; border-radius: 12px;
    overflow: hidden; flex-shrink: 0; background: var(--gradient-main);
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .pay-icon-wrap img { width:100%; height:100%; object-fit:cover; }
  .pay-details { flex: 1; }
  .pay-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .pay-number { font-size: 13px; color: var(--accent-green); font-weight: 600; margin-bottom: 2px; }
  .pay-instructions { font-size: 12px; color: var(--text-muted); }
  .payment-input-wrap { margin-bottom: 16px; }
  .payment-input-wrap label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; display: block; font-weight: 600; }
  .payment-input {
    width: 100%; padding: 12px 16px; border-radius: 12px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-primary); font-size: 14px; transition: var(--transition);
  }
  .payment-input:focus { border-color: var(--accent-blue); }
  .payment-price-tag {
    text-align: center; padding: 12px; margin-bottom: 16px;
    background: rgba(79,142,247,0.08); border-radius: 12px; border: 1px solid rgba(79,142,247,0.2);
  }
  .payment-price-tag span { font-size: 24px; font-weight: 800; background: var(--gradient-main); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

  /* ===== CONFIRMATION ===== */
  .confirm-box { text-align: center; padding: 24px 16px; }
  .confirm-icon { font-size: 56px; margin-bottom: 16px; animation: bounce 0.6s ease; }
  @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-12px); } }
  .confirm-title { font-size: 20px; font-weight: 800; color: var(--accent-green); margin-bottom: 8px; }
  .confirm-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }
  .btn-telegram {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px; border-radius: 14px;
    background: linear-gradient(135deg, #229ED9, #0088cc);
    color: #fff; font-weight: 700; font-size: 15px;
    text-decoration: none; transition: var(--transition);
    box-shadow: 0 4px 20px rgba(34,158,217,0.3);
  }
  .btn-telegram:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(34,158,217,0.4); }

  /* ===== ADMIN PANEL ===== */
  #admin-fab {
    position: fixed; bottom: 100px; right: 16px; z-index: 200;
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--gradient-card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: var(--transition); cursor: pointer; color: var(--text-muted);
  }
  #admin-fab:hover { border-color: var(--accent-blue); transform: rotate(45deg) scale(1.1); color: var(--accent-blue); }

  .admin-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
    display: none;
  }
  .admin-overlay.open { display: block; }
  .admin-panel {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: min(400px, 100%); background: var(--bg-modal);
    border-left: 1px solid var(--border);
    overflow-y: auto; transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
  }
  .admin-overlay.open .admin-panel { transform: translateX(0); }
  .admin-header {
    padding: 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg-modal); z-index: 1;
  }
  .admin-title {
    font-size: 18px; font-weight: 800;
    background: var(--gradient-main); -webkit-background-clip:text;
    -webkit-text-fill-color:transparent; background-clip:text;
  }
  .close-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--bg-card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--text-secondary); transition: var(--transition);
    cursor: pointer;
  }
  .close-btn:hover { background: #ff4444; color: #fff; border-color: #ff4444; }
  .admin-body { padding: 16px; flex: 1; }
  .admin-section { margin-bottom: 24px; }
  .admin-section-title {
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent-blue);
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; display: block; font-weight: 600; }
  .form-input, .form-textarea, .form-select {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-primary); font-size: 13px; transition: var(--transition);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--bg-card); }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent-blue); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .upload-btn-wrap { position: relative; display: inline-block; }
  .upload-btn {
    padding: 8px 16px; border-radius: 8px;
    background: rgba(79,142,247,0.15); border: 1px dashed var(--accent-blue);
    color: var(--accent-blue); font-size: 12px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px; transition: var(--transition);
  }
  .upload-btn:hover { background: rgba(79,142,247,0.25); }

  const rank = showRank ? `<div style="position:absolute;top:8px;left:8px;background:var(--gradient-main);border-radius:8px;padding:2px 7px;font-size:10px;font-weight:900;color:#000;z-index:2;">#${showRank}</div>` : '';

      <div class="app-icon-wrap">${iconHTML}</div>

  const appsGrid = document.getElementById('apps-grid');

// ===== DOWNLOAD =====
function downloadApp(url, name) {
  if(!url || url.includes('EXAMPLE_ID')) {
    showToast('⚠️ No download link set for this app');
    return;
  }
  showToast(`⬇️ Downloading ${name}...`);
  window.open(url, '_blank');
}

let selectedPayId = null;
function selectPayment(id) {
  document.querySelectorAll('.payment-method').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('[id^="pm-check-"]').forEach(el => el.textContent = '○');
  const el = document.getElementById('pm-'+id);
  if(el) { el.classList.add('selected'); }
  const chk = document.getElementById('pm-check-'+id);
  if(chk) chk.textContent = '✅';
  selectedPayId = id;
}

function submitPayment() {
  const trx = document.getElementById('trx-input');
  if(!trx || !trx.value.trim()) { showToast('⚠️ Please enter your Transaction ID'); return; }
  if(!selectedPayId) { showToast('⚠️ Please select a payment method'); return; }
  const tg = loadTelegramLink();
  const content = document.getElementById('payment-modal-content');
  content.innerHTML = `
    <div class="confirm-box">
      <div class="confirm-icon">✅</div>
      <div class="confirm-title">Payment Submitted Successfully!</div>
      <div class="confirm-sub">Your payment proof has been submitted.<br>Please contact us on Telegram to receive your app.<br><br><strong style="color:var(--accent-blue)">TrxID: ${document.getElementById('trx-input')?document.getElementById('trx-input').value:''}</strong></div>

      <br><br>
      <button class="btn-secondary" onclick="closeModal('payment-modal')" style="width:100%;margin-top:8px">Close</button>
    </div>
  `;
}

// ===== CLOSE MODAL =====
function closeModal(id, event) {
  if(event && event.target !== document.getElementById(id)) return;
  if(!event) document.getElementById(id).classList.remove('open');
  else document.getElementById(id).classList.remove('open');
}

// ===== SEARCH =====
function doSearch(q) {
  const appsArr = loadApps();
  const term = q.toLowerCase().trim();
  const results = term ? appsArr.filter(a =>
    a.name.toLowerCase().includes(term) ||
    a.desc.toLowerCase().includes(term) ||
    (a.category||'').toLowerCase().includes(term)
  ) : appsArr;
  const el = document.getElementById('search-results');
  const title = document.getElementById('search-title');
  if(!term) title.textContent = '🔍 Search Results';
  el.innerHTML = results.length
    ? results.map(a => appCardHTML(a)).join('')
    : '<p style="color:var(--text-muted);text-align:center;padding:40px;grid-column:1/-1">No apps found for "'+q+'"</p>';
}

// ===== TAB SWITCHING =====
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('[id^="tab-"]').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('tab-'+tab);
  if(el) el.classList.add('active');
  activeTopTab = tab;

  // Show the main tab area
  showMainArea();
  // Update bottom nav to Apps
  setBottomActive('nav-apps');
  activeBottomTab = 'apps-main';
}

function showMainArea() {
  ['tab-foryou','tab-topcharts','tab-kids','tab-categories'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.display = el.classList.contains('active') ? 'block' : 'none';
  });
  ['page-games','page-apps','page-search','page-books','page-you'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.display = 'none';
  });
  document.getElementById('top-tabs').style.display = 'flex';
}

function switchBottomTab(tab) {
  const topTabsEl = document.getElementById('top-tabs');
  // Hide all tab pages
  ['tab-foryou','tab-topcharts','tab-kids','tab-categories'].forEach(id => {
    const el = document.getElementById(id);
    if(el) { el.classList.remove('active'); el.style.display = 'none'; }
  });
  ['page-games','page-apps','page-search','page-books','page-you'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.display = 'none';
  });

  // Reset bottom nav
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  if(tab === 'apps-main') {
    topTabsEl.style.display = 'flex';
    const activeTab = document.getElementById('tab-'+activeTopTab) || document.getElementById('tab-foryou');
    if(activeTab) { activeTab.style.display = 'block'; activeTab.classList.add('active'); }
    setBottomActive('nav-apps');
  } else {
    topTabsEl.style.display = 'none';
    const pageEl = document.getElementById('page-'+tab);
    if(pageEl) pageEl.style.display = 'block';
    setBottomActive('nav-'+tab);
  }
  activeBottomTab = tab;
}

function setBottomActive(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById(id);
  if(el) el.classList.add('active');
}

}

// ===== TEMP ICON STORAGE =====
window._tempAppIcon = '';
window._tempPayIcon = '';

function handleAppIconUpload(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    window._tempAppIcon = e.target.result;
    const preview = document.getElementById('app-icon-preview');
    if(preview) { preview.src = e.target.result; preview.style.display='block'; }
  };
  reader.readAsDataURL(file);
}

function handlePayIconUpload(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    window._tempPayIcon = e.target.result;
    const preview = document.getElementById('pay-icon-preview');
    if(preview) { preview.src = e.target.result; preview.style.display='block'; }
  };
  reader.readAsDataURL(file);
}

function handleLogoUpload(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    saveLogo(e.target.result);
    renderLogo();
    showToast('✅ Logo updated!');
    renderAdminMain();
  };
  reader.readAsDataURL(file);
}

function removeLogo() {
  saveLogo('');
  renderLogo();
  showToast('🗑️ Logo removed');
  renderAdminMain();
}

// ===== TOGGLE PRICE FIELD =====
function togglePriceField() {
  const typeEl = document.getElementById('app-type-in');
  const priceEl = document.getElementById('price-field');
  if(typeEl && priceEl) {
    priceEl.style.display = typeEl.value === 'paid' ? 'block' : 'none';
  }
}

// ===== SAVE APP =====
function saveApp() {
  const name = (document.getElementById('app-name-in')||{}).value||'';
  const desc = (document.getElementById('app-desc-in')||{}).value||'';
  const size = (document.getElementById('app-size-in')||{}).value||'';
  const ver = (document.getElementById('app-ver-in')||{}).value||'';
  const cat = (document.getElementById('app-cat-in')||{}).value||'Apps';
  const dl = (document.getElementById('app-dl-in')||{}).value||'';
  const type = (document.getElementById('app-type-in')||{}).value||'free';
  const price = (document.getElementById('app-price-in')||{}).value||'';
  const rating = parseFloat((document.getElementById('app-rating-in')||{}).value)||4.0;
  const emoji = (document.getElementById('app-emoji-in')||{}).value||'📱';

  if(!name.trim()) { showToast('⚠️ App name is required'); return; }
  if(!desc.trim()) { showToast('⚠️ Description is required'); return; }

  const icon = window._tempAppIcon || (editingAppId ? (loadApps().find(a=>a.id===editingAppId)||{}).icon||'' : '');
  const downloadURL = dl ? `https://drive.google.com/uc?export=download&id=${dl.trim()}` : '';

  let appsArr = loadApps();

  if(editingAppId) {
    const idx = appsArr.findIndex(a=>a.id===editingAppId);
    if(idx !== -1) {
      appsArr[idx] = { ...appsArr[idx], name, desc, size, version:ver, category:cat, download:downloadURL, type, price, rating, icon, emoji };
    }
    editingAppId = null;
    showToast('✅ App updated!');
  } else {
    const newApp = { id:'app'+Date.now(), name, desc, size, version:ver, category:cat, icon, emoji, download:downloadURL, type, price, rating };
    appsArr.push(newApp);
    showToast('✅ App added!');
  }

  window._tempAppIcon = '';
  saveApps(appsArr);
  apps = appsArr;
  renderAllGrids();
  renderFeatured();
  renderAdminMain();
}

function editApp(id) {
  editingAppId = id;
  window._tempAppIcon = '';
  renderAdminMain();
  document.getElementById('admin-panel').scrollTop = 0;
}

function cancelEditApp() {
  editingAppId = null;
  window._tempAppIcon = '';
  renderAdminMain();
}

function deleteApp(id) {
  if(!confirm('Delete this app?')) return;
  let appsArr = loadApps().filter(a=>a.id!==id);
  saveApps(appsArr);
  apps = appsArr;
  renderAllGrids();
  renderFeatured();
  showToast('🗑️ App deleted');
  renderAdminMain();
}

// ===== SAVE PAYMENT =====
function savePayment() {
  const name = (document.getElementById('pay-name-in')||{}).value||'';
  const num = (document.getElementById('pay-num-in')||{}).value||'';
  const instr = (document.getElementById('pay-instr-in')||{}).value||'';
  const emoji = (document.getElementById('pay-emoji-in')||{}).value||'💳';

  if(!name.trim()) { showToast('⚠️ Payment name required'); return; }

  const icon = window._tempPayIcon || (editingPayId ? (loadPayments().find(p=>p.id===editingPayId)||{}).icon||'' : '');

  let pays = loadPayments();

  if(editingPayId) {
    const idx = pays.findIndex(p=>p.id===editingPayId);
    if(idx !== -1) {
      pays[idx] = { ...pays[idx], name, number:num, instructions:instr, icon, emoji };
    }
    editingPayId = null;
    showToast('✅ Payment method updated!');
  } else {
    pays.push({ id:'pay'+Date.now(), name, number:num, instructions:instr, icon, emoji });
    showToast('✅ Payment method added!');
  }

  window._tempPayIcon = '';
  savePayments(pays);
  renderAdminMain();
}

function editPay(id) {
  editingPayId = id;
  window._tempPayIcon = '';
  renderAdminMain();
  document.getElementById('admin-panel').scrollTo({ top: document.getElementById('admin-panel').scrollHeight, behavior:'smooth' });
}

function cancelEditPay() {
  editingPayId = null;
  window._tempPayIcon = '';
  renderAdminMain();
}

function deletePay(id) {
  if(!confirm('Delete this payment method?')) return;
  let pays = loadPayments().filter(p=>p.id!==id);
  savePayments(pays);
  showToast('🗑️ Payment method deleted');
  renderAdminMain();
}

function saveTelegramSetting() {
  const val = (document.getElementById('tg-link-input')||{}).value||'https://t.me/anmods';
  saveTelegramLink(val.trim());
  showToast('✅ Telegram link saved!');
}

function adminLogout() {
  isAdminLoggedIn = false;
  showToast('🔒 Logged out from admin');
  renderAdminBody();
}

// ===== INIT BOTTOM NAV =====
// Default state: Apps main
switchBottomTab('apps-main');
setBottomActive('nav-apps');
</script>
